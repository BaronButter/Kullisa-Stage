name: stable-linux

on:
  workflow_dispatch:
    inputs:
      generate_assets:
        type: boolean
        description: Generate assets
  repository_dispatch:
    types: [stable]
  push:
    branches: [ master ]
    paths-ignore:
    - '**/*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
    - '**/*.md'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  APP_NAME: Kullisa Stage
  ASSETS_REPOSITORY: ${{ github.repository }}
  BINARY_NAME: kullisa
  DISABLE_UPDATE: 'yes'
  GH_REPO_PATH: ${{ github.repository }}
  ORG_NAME: KullisaLabs
  OS_NAME: linux
  VERSIONS_REPOSITORY: ${{ github.repository_owner }}/versions
  VSCODE_QUALITY: stable

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      MS_COMMIT: ${{ env.MS_COMMIT }}
      MS_TAG: ${{ env.MS_TAG }}
      RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
      SHOULD_BUILD: ${{ env.SHOULD_BUILD }}
      SHOULD_DEPLOY: ${{ env.SHOULD_DEPLOY }}

    steps:
      - uses: actions/checkout@v6
      - name: Switch to relevant branch
        run: ./get_pr.sh
      - name: Clone VSCode repo
        run: ./get_repo.sh
      - name: Check PR or cron
        run: ./check_cron_or_pr.sh
      - name: Check existing VSCodium tags/releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./check_tags.sh

  compile:
    needs: check
    runs-on: ubuntu-22.04
    env:
      MS_COMMIT: ${{ needs.check.outputs.MS_COMMIT }}
      MS_TAG: ${{ needs.check.outputs.MS_TAG }}
      RELEASE_VERSION: ${{ needs.check.outputs.RELEASE_VERSION }}
      SHOULD_BUILD: ${{ (needs.check.outputs.SHOULD_BUILD == 'yes' || github.event.inputs.generate_assets == 'true') && 'yes' || 'no' }}
      VSCODE_ARCH: 'x64'
    steps:
      - uses: actions/checkout@v6
      - name: Setup GCC
        uses: egor-tensin/setup-gcc@v2
        with:
          version: 10
          platform: x64
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Setup Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install libkrb5-dev
        run: sudo apt-get update -y && sudo apt-get install -y libkrb5-dev
      - name: Clone VSCode repo
        run: ./get_repo.sh
      - name: Build
        run: ./build.sh
      - name: Compress vscode artifact
        run: |
          find vscode -type f -not -path "*/node_modules/*" -not -path "vscode/.build/node/*" -not -path "vscode/.git/*" > vscode.txt
          tar -czf vscode.tar.gz -T vscode.txt
      - name: Upload vscode artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode
          path: ./vscode.tar.gz

  build:
    needs: [check, compile]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - slug: X64
          vscode_arch: x64
          npm_arch: x64
          image: vscodium/vscodium-linux-build-agent:focal-x64
    container:
      image: ${{ matrix.image }}
    env:
      RELEASE_VERSION: ${{ needs.check.outputs.RELEASE_VERSION }}
      SHOULD_BUILD: ${{ (needs.check.outputs.SHOULD_BUILD == 'yes' || github.event.inputs.generate_assets == 'true') && 'yes' || 'no' }}
      SHOULD_DEPLOY: ${{ needs.check.outputs.SHOULD_DEPLOY }}
      VSCODE_ARCH: ${{ matrix.vscode_arch }}
      SHOULD_BUILD_TAR: 'yes'
      SHOULD_BUILD_DEB: 'no'
      SHOULD_BUILD_RPM: 'no'
      SHOULD_BUILD_APPIMAGE: 'no'
    steps:
      - uses: actions/checkout@v6
      - name: Install GH
        run: ./build/linux/install_gh.sh
      - name: Install dependencies
        run: ./build/linux/deps.sh
      - name: Download vscode artifact
        uses: actions/download-artifact@v8
        with:
          name: vscode
      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./build/linux/package_bin.sh
      - name: Prepare assets
        run: ./prepare_assets.sh
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: ./release.sh
